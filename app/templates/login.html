<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login · JKControl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script>
    (function () { const t = localStorage.getItem('theme') || 'light'; document.documentElement.setAttribute('data-theme', t); })();
  </script>
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <span class="logo">JK</span>
      <h1>Relatórios IoT</h1>
    </div>

    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    {% if info %}<div class="login-info">{{ info }}</div>{% endif %}

    {% if must_change %}
    <form method="post" action="/change-password" class="login-form">
      <h2>Defina uma nova senha</h2>
      <p class="hint" style="margin-bottom: 12px;">Primeira vez no sistema — a senha padrão precisa ser trocada.</p>
      <label>
        Nova senha
        <input type="password" name="new_password" required minlength="4" autofocus>
      </label>
      <label>
        Confirmar
        <input type="password" name="confirm" required minlength="4">
      </label>
      <button type="submit" class="btn-primary" style="width:100%;">Salvar e entrar</button>
    </form>
    {% else %}
    <form method="post" action="/login" class="login-form">
      <label>
        Usuário
        <input type="text" name="username" required autofocus autocomplete="username">
      </label>
      <label>
        Senha
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn-primary" style="width:100%;">Entrar</button>
    </form>
    <p class="hint" style="text-align:center; margin-top: 16px;">
      Primeira execução? Use <code>admin / admin</code>
    </p>
    {% endif %}
  </div>
</body>
</html>
